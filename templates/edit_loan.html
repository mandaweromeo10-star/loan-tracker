<form method="POST" class="container mt-4">

    <input name="name" value="{{ loan.name }}" class="form-control mb-2">

    <input name="total" value="{{ loan.total_amount }}" class="form-control mb-2">

    <input type="date" name="due_date" value="{{ loan.due_date }}" class="form-control mb-2">

    <button class="btn btn-success w-100">Save</button>

</form>
