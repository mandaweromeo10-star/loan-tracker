<!DOCTYPE html>
<html>
<head>
<title>Add Entry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
      max-width: 480px;
    margin: auto;
}

.card {
    background: rgba(30,41,59,0.9);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    color: #e2e8f0;
}

.form-control {
    background: #334155;
    border: none;
    color: white;
}

.form-control:focus {
    background: #334155;
    color: white;
    box-shadow: none;
}

.input-group-text {
    background: #1e293b;
    border: none;
    color: #94a3b8;
}

.btn-primary {
    background: #2563eb;
    border: none;
}

.btn-dark {
    background: #334155;
    border: none;
}

.preview-img {
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
    display:none;
    transition: 0.3s;
}

.preview-img:hover {
    transform: scale(1.05);
}

.label {
    font-size: 13px;
    color: #94a3b8;
}

.fade-in {
    animation: fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container py-4 fade-in">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>➕ Add Entry</h4>
        <a href="/" class="btn btn-dark btn-sm">← Back</a>
    </div>

    <!-- CARD -->
    <div class="card shadow p-4">

        <form method="POST" enctype="multipart/form-data">

           <div class="mb-3">
    <div class="label">Type</div>
    <select name="type" class="form-control">
        <option value="loan">Loan</option>
        <option value="utility">Utility Bill</option>
    </select>
</div>
    <!-- Loan Name -->
<div class="mb-3">
    <div class="label">Loan / Bill Name</div>
    <input type="text" name="name" class="form-control" placeholder="e.g. ASA / PLDT / Electric Bill" required>
</div>
            <!-- Amount + Charges -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="label">Total Amount</div>
                    <div class="input-group">
                        <span class="input-group-text">₱</span>
                        <input type="number" name="total" class="form-control" required>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <div class="label">Charges</div>
                    <div class="input-group">
                        <span class="input-group-text">₱</span>
                        <input type="number" name="charges" class="form-control" required>
                    </div>
                </div>
            </div>

            <!-- Due Date -->
            <div class="mb-3">
                <div class="label">Due Date</div>
                <input type="date" name="due_date" class="form-control" required>
            </div>

            <!-- Upload -->
            <div class="mb-3">
                <div class="label">Loan Image</div>
                <input type="file" name="image" class="form-control" accept="image/*" onchange="previewImage(event)">
            </div>

            <!-- Preview -->
            <div class="text-center mb-3">
                <img id="preview" class="preview-img shadow">
            </div>

            <!-- Button -->
            <button class="btn btn-primary w-100">💾 Save</button>

        </form>

    </div>

</div>

<script>
function previewImage(event){
    const img = document.getElementById('preview');
    const file = event.target.files[0];

    if(file){
        img.src = URL.createObjectURL(file);
        img.style.display = 'block';
    }
}
</script>

</body>
</html>
