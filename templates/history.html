<!DOCTYPE html>
<html>
<head>
<title>Payment History</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
}

.card {
    background: rgba(30,41,59,0.9);
    border-radius: 18px;
    color: #e2e8f0;
}

.receipt-img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
}

.text-muted {
    color: #94a3b8 !important;
}

.btn-dark {
    background: #334155;
    border: none;
}
</style>

</head>

<body>

<div class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>📜 {{ loan.name }} History</h4>
        <a href="/" class="btn btn-dark btn-sm">← Back</a>
    </div>

    <!-- PAYMENTS -->
    {% if payments %}
        {% for p in payments %}
        <div class="card p-3 mb-3 shadow-sm">

            <div class="d-flex justify-content-between align-items-center">

                <div>
                    <h5 class="text-success mb-1">₱{{ p.amount }}</h5>
                    <small class="text-muted">{{ p.payment_date }}</small>
                </div>

                <div>
                    {% if p.proof_image %}
                        <!-- ✅ FIXED (no JS string conflict) -->
                        <img src="{{ url_for('static', filename='uploads/' + p.proof_image) }}"
                             class="receipt-img"
                             data-src="{{ url_for('static', filename='uploads/' + p.proof_image) }}"
                             onclick="showReceipt(this)">
                    {% else %}
                        <small class="text-muted">No receipt</small>
                    {% endif %}
                </div>

            </div>

        </div>
        {% endfor %}
    {% else %}
        <p>No payments yet.</p>
    {% endif %}

</div>

<!-- 🖼️ MODAL -->
<div class="modal fade" id="receiptModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark">
      <div class="modal-body text-center">
        <img id="receiptImg" style="width:100%">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function showReceipt(img){
    const src = img.getAttribute("data-src");
    document.getElementById('receiptImg').src = src;
    new bootstrap.Modal(document.getElementById('receiptModal')).show();
}
</script>

</body>
</html>
