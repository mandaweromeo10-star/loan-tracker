<!DOCTYPE html>
<html>
<head>
<title>Add Payment</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
     max-width: 480px;
    margin: auto;
}

.card {
    background: rgba(30,41,59,0.9);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    color: #e2e8f0;
}

.form-control {
    background: #334155;
    border: none;
    color: white;
}

.form-control:focus {
    background: #334155;
    color: white;
    box-shadow: none;
}

.input-group-text {
    background: #1e293b;
    border: none;
    color: #94a3b8;
}

.btn-success {
    background: #16a34a;
    border: none;
}

.btn-dark {
    background: #334155;
    border: none;
}

.preview-img {
    width:130px;
    height:130px;
    object-fit:cover;
    border-radius:12px;
    display:none;
    transition: 0.3s;
}

.preview-img:hover {
    transform: scale(1.05);
}

.label {
    font-size: 13px;
    color: #94a3b8;
}

.fade-in {
    animation: fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container py-4 fade-in">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>💸 Add Payment</h4>
        <a href="/" class="btn btn-dark btn-sm">← Back</a>
    </div>

    <!-- CARD -->
    <div class="card shadow p-4">

        <form method="POST" enctype="multipart/form-data">

            <!-- Amount -->
            <div class="mb-3">
                <div class="label">Payment Amount</div>
                <div class="input-group">
                    <span class="input-group-text">₱</span>
                    <input type="number" name="amount" class="form-control" required>
                </div>
            </div>

            <!-- Date -->
            <div class="mb-3">
                <div class="label">Payment Date</div>
                <input type="date" name="date" class="form-control" required>
            </div>

            <!-- Upload Receipt -->
            <div class="mb-3">
                <div class="label">Upload Receipt</div>
                <input type="file" name="proof" class="form-control" accept="image/*" onchange="previewImage(event)">
            </div>

            <!-- Preview -->
            <div class="text-center mb-3">
                <img id="preview" class="preview-img shadow">
            </div>

            <!-- Button -->
            <button class="btn btn-success w-100">💾 Save Payment</button>

        </form>

    </div>

</div>

<script>
function previewImage(event){
    const img = document.getElementById('preview');
    const file = event.target.files[0];

    if(file){
        img.src = URL.createObjectURL(file);
        img.style.display = 'block';
    }
}
</script>

</body>
</html>
